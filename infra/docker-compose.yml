services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../frontend
    environment:
      FRONTEND_PUBLIC_APP_NAME: ${FRONTEND_PUBLIC_APP_NAME}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
    command:
      [
        "sh",
        "-c",
        "python /app/scripts/validate_env.py frontend && python -m http.server ${FRONTEND_PORT:-5173} --bind 0.0.0.0 --directory /app/dist",
      ]
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${FRONTEND_PORT:-5173}/', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ../backend
    environment:
      BACKEND_SERVICE_NAME: ${BACKEND_SERVICE_NAME}
      BACKEND_VERSION: ${BACKEND_VERSION}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
    command:
      [
        "sh",
        "-c",
        "python /app/scripts/validate_env.py backend && uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8000}",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${BACKEND_PORT:-8000}/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kb}
      POSTGRES_USER: ${POSTGRES_USER:-kb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kb} -d ${POSTGRES_DB:-kb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  onlyoffice:
    image: onlyoffice/documentserver:8.3
    environment:
      JWT_ENABLED: ${ONLYOFFICE_JWT_ENABLED:-false}
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-onlyoffice-dev-secret}
    ports:
      - "${ONLYOFFICE_PORT:-8082}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 8

volumes:
  postgres_data:
  redis_data:
  minio_data:
